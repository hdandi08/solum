version: 1
frontend:
  phases:
    preBuild:
      commands:
        - pwd && ls
        - npm --prefix web ci
    build:
      commands:
        - pwd && ls
        - npm --prefix web run build
  artifacts:
    baseDirectory: web/dist
    files:
      - '**/*'
  cache:
    paths:
      - web/node_modules/**/*
