version: 1
frontend:
  phases:
    preBuild:
      commands:
        - nvm install 22 && nvm use 22
        - bash --noprofile --norc -c "cd web && npm install"
    build:
      commands:
        - nvm use 22
        - bash --noprofile --norc -c "cd web && npm run build"
  artifacts:
    baseDirectory: web/dist
    files:
      - '**/*'
  cache:
    paths:
      - web/node_modules/**/*
