version: 1
frontend:
  phases:
    preBuild:
      commands:
        - node --version && npm --version
        - nvm install 22 && nvm use 22 && node --version
        - npm --prefix web ci
    build:
      commands:
        - nvm use 22
        - npm --prefix web run build
  artifacts:
    baseDirectory: web/dist
    files:
      - '**/*'
  cache:
    paths:
      - web/node_modules/**/*
