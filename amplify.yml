version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm --prefix web ci --include=dev
    build:
      commands:
        - echo "VITE_SUPABASE_URL=$VITE_SUPABASE_URL" >> web/.env
        - echo "VITE_SUPABASE_ANON_KEY=$VITE_SUPABASE_ANON_KEY" >> web/.env
        - echo "VITE_STRIPE_PUBLISHABLE_KEY=$VITE_STRIPE_PUBLISHABLE_KEY" >> web/.env
        - echo "VITE_AXON_PIXEL_ID=$VITE_AXON_PIXEL_ID" >> web/.env
        - echo "VITE_POSTHOG_KEY=$VITE_POSTHOG_KEY" >> web/.env
        - echo "VITE_POSTHOG_HOST=$VITE_POSTHOG_HOST" >> web/.env
        - npm --prefix web run build
  artifacts:
    baseDirectory: web/dist
    files:
      - '**/*'
  cache:
    paths:
      - web/node_modules/**/*
  customRules:
    - source: '</^[^.]+$|\.(?!(css|gif|ico|jpg|jpeg|js|png|txt|svg|woff|woff2|ttf|map|json)$)([^.]+$)/>'
      target: /index.html
      status: '200'
