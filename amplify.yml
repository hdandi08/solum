version: 1
frontend:
  phases:
    preBuild:
      commands:
        - nvm install 22 && nvm use 22
        - pwd && ls web/
        - npm --prefix web install
    build:
      commands:
        - nvm use 22
        - node --version
        - ls web/node_modules/.bin/vite || echo "VITE NOT FOUND"
        - npm --prefix web run build
  artifacts:
    baseDirectory: web/dist
    files:
      - '**/*'
