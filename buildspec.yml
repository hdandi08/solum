version: 0.2

env:
  parameter-store:
    TEST_USER_EMAIL:           /solum/test/user-email
    SUPABASE_URL:              /solum/test/supabase-url
    SUPABASE_SERVICE_ROLE_KEY: /solum/test/supabase-svc-key
    DEV_BASE_URL:              /solum/test/dev-base-url

phases:
  install:
    runtime-versions:
      nodejs: 20
    commands:
      - cd $CODEBUILD_SRC_DIR/tests/e2e
      - npm ci
      - npx playwright install --with-deps chromium

  build:
    commands:
      - cd $CODEBUILD_SRC_DIR/tests/e2e
      - npx playwright test --reporter=list,html
      - echo "BUILD_EXIT=$?" >> $CODEBUILD_SRC_DIR/build-result.env

  post_build:
    commands:
      - cd $CODEBUILD_SRC_DIR
      - |
        REPORT_DATE=$(date +%Y-%m-%d)
        REPORT_KEY="reports/$REPORT_DATE/index.html"
        aws s3 sync tests/e2e/playwright-report \
          s3://$REPORT_BUCKET/reports/$REPORT_DATE/ --delete --quiet
        # Pre-signed URL — valid 7 days, no public bucket access needed
        REPORT_URL=$(aws s3 presign s3://$REPORT_BUCKET/$REPORT_KEY \
          --expires-in 604800 --region eu-west-2)
        echo "Report: $REPORT_URL"
        if [ "$CODEBUILD_BUILD_SUCCEEDING" = "0" ]; then
          MSG=$(printf 'SOLUM E2E tests FAILED on dev (%s).\n\nOpen the report (link valid 7 days):\n%s\n\nBuild ID: %s' \
            "$REPORT_DATE" "$REPORT_URL" "$CODEBUILD_BUILD_ID")
          aws sns publish \
            --topic-arn $SNS_TOPIC_ARN \
            --subject "SOLUM E2E Tests FAILED — $REPORT_DATE" \
            --message "$MSG"
        fi

artifacts:
  files:
    - tests/e2e/playwright-report/**/*
  discard-paths: no
